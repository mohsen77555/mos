name: Build Android APK

# يبني ملف APK تلقائياً عند كل دفع للفرع، ويتيح تنزيله من Artifacts
on:
  push:
    branches:
      - claude/flour-mill-maintenance-app-5lgg4
    paths:
      - 'android/**'
      - 'index.html'
      - 'css/**'
      - 'js/**'
      - 'icons/**'
      - 'manifest.webmanifest'
      - 'sw.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync web assets into Android project
        run: |
          rm -rf android/app/src/main/assets/www
          mkdir -p android/app/src/main/assets/www
          cp index.html manifest.webmanifest sw.js android/app/src/main/assets/www/
          cp -r css js icons android/app/src/main/assets/www/

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/flour-mill-maintenance.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flour-mill-maintenance-apk
          path: out/flour-mill-maintenance.apk
          if-no-files-found: error
