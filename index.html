<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#714B67" />
  <meta name="description" content="نظام تخطيط موارد المؤسسات (ERP) عربي بالكامل — مبيعات ومشتريات ومخزون ومحاسبة وموارد بشرية، يعمل دون اتصال." />
  <title>MOS ERP — نظام إدارة الأعمال</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- شريط التطبيق العلوي -->
  <header class="appbar">
    <button id="menuBtn" class="icon-btn" aria-label="القائمة">☰</button>
    <h1 id="pageTitle">لوحة التحكم</h1>
    <div class="appbar-actions">
      <button id="themeBtn" class="icon-btn" aria-label="السمة" title="الوضع الداكن/الفاتح">🌙</button>
      <button id="homeBtn" class="icon-btn" aria-label="التطبيقات" title="التطبيقات">▦</button>
      <button id="exportBtn" class="icon-btn" aria-label="نسخة احتياطية" title="نسخ/استرجاع البيانات">⇅</button>
    </div>
  </header>

  <!-- القائمة الجانبية (Drawer) -->
  <div id="drawer" class="drawer hidden">
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer-panel">
      <div class="drawer-head">
        <span class="brand">MOS&nbsp;<b>ERP</b></span>
        <span class="brand-sub" id="brandCompany">شركتي</span>
      </div>
      <nav id="drawerNav" class="drawer-nav"></nav>
    </aside>
  </div>

  <!-- المحتوى الرئيسي -->
  <main id="view" class="view"></main>

  <!-- زر الإضافة العائم -->
  <button id="fab" class="fab" aria-label="إضافة">＋</button>

  <!-- النافذة المنبثقة (Modal) -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="modalTitle">عنوان</h2>
        <button id="modalClose" class="icon-btn" aria-label="إغلاق">✕</button>
      </div>
      <form id="modalForm" class="modal-body" autocomplete="off"></form>
    </div>
  </div>

  <!-- إشعار سريع -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/app.js"></script>
</body>
</html>
